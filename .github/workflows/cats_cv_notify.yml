name: CATs CV Notify

on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:        # 手動実行も可能

concurrency:
  group: cats-cv-notify
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore state
        uses: actions/cache@v4
        with:
          path: .cats_last_check.json
          key: cats-cv-state-${{ github.run_id }}
          restore-keys: cats-cv-state-

      - name: Run CV check loop
        env:
          CATS_LOGIN_ID: ${{ secrets.CATS_LOGIN_ID }}
          CATS_PASSWORD: ${{ secrets.CATS_PASSWORD }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python cats_cv_notify_ci.py
